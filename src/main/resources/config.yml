config-version: 1 # Не трогать эту строку, она используется для управления версиями конфигурации.

currency-item: GOLD_INGOT # Основной предмет-валюта для торговли караванов.

default-caravan-limit: 1 # Базовый лимит караванов для игрока без специальных прав.
permission-limits:
  meltarion.caravans.limit.2: 2
  meltarion.caravans.limit.3: 3

caravan:
  max-name-length: 24 # Максимальная длина имени каравана.
  inventory-size: 27 # Размер инвентаря каравана. Допустимые значения: 9, 18, 27, 36, 45, 54.
  health: 5000 # Базовое здоровье новых караванов.
  damage-multiplier: 1.0 # Множитель входящего урона по каравану.
  visual-health-sync-interval-ticks: 20 # Как часто визуально синхронизировать здоровье проекции сущностей.

# Включает обязательную лицензию для создания каравана.
caravan-license:
  enabled: true
  material: PAPER # Материал предмета лицензии.
  custom-model-data: 10001 # CustomModelData для ресурс-пака, если используется.
  display-name: "&6Лицензия на караван" # Отображаемое имя лицензии. Описание предмета лицензии.
  lore:
    - "&7Требуется для создания одного каравана."
  require-display-name: true # Проверять ли имя предмета при распознавании лицензии.
  require-lore: false # Проверять ли lore при распознавании лицензии.
  require-custom-model-data: true # Проверять ли CustomModelData при распознавании лицензии.
  consume-on-create: true # Расходовать ли лицензию после успешного создания каравана.
  allow-right-click-create: true # Разрешать ли создание каравана правым кликом по лицензии.

trade:
  setup-timeout-seconds: 60 # Таймаут чат-настройки торговых операций, в секундах.
  buy-catalog: # Материалы, запрещённые в каталоге заявок на покупку.
    blacklist:
      - BEDROCK
      - BARRIER
      - COMMAND_BLOCK
      - CHAIN_COMMAND_BLOCK
      - REPEATING_COMMAND_BLOCK
      - STRUCTURE_BLOCK
      - STRUCTURE_VOID
      - JIGSAW
      - LIGHT
      - DEBUG_STICK
      - KNOWLEDGE_BOOK
      - PLAYER_HEAD
      - COMMAND_BLOCK_MINECART

movement:
  enabled: true # Включает виртуальное перемещение караванов.
  tick-interval-seconds: 2 # Интервал обновления перемещения, в секундах.
  database-save-interval-seconds: 30 # Интервал периодического сохранения движения в БД, в секундах.
  default-speed-blocks-per-second: 1.5 # Скорость перемещения по умолчанию, блоков в секунду.
  physical-projection-radius: 96 # Радиус появления физической проекции рядом с игроками.
  physical-despawn-radius: 128 # Радиус исчезновения физической проекции при удалении игроков.
  arrival-distance: 3 # Дистанция, на которой цель считается достигнутой.
  adjust-y-to-highest-block: true # Подстраивать ли Y к высоте поверхности, если чанк уже загружен.
  max-y-adjust-per-update: 8 # Максимальная коррекция Y за одно обновление.
  pause-when-attacked: true # Ставить ли караван на паузу при атаке.
  attacked-notification-cooldown-seconds: 30 # Кулдаун уведомлений об атаке владельцу, в секундах.
  auto-resume-after-attack: true # Автоматически возобновлять маршрут после атаки.
  auto-resume-delay-seconds: 120 # Задержка перед авто-возобновлением после атаки, в секундах.

projection:
  spawn-cooldown-seconds: 5 # Минимальная задержка между повторными спавнами проекции, в секундах.
  despawn-cooldown-seconds: 5 # Минимальная задержка между повторными despawn проекции, в секундах.
  smooth-follow-distance: 8 # Дистанция, на которой проекция пытается плавно следовать к позиции.
  teleport-correction-distance: 24 # Дистанция, после которой разрешена телепортационная коррекция.
  movement-sync-interval-ticks: 20 # Интервал синхронизации движения проекции, в тиках.

interaction:
  cooldown-millis: 500 # Кулдаун взаимодействия с караваном, в миллисекундах.

route: # Включает систему маршрутов.
  enabled: true
  setup-timeout-seconds: 60 # Таймаут настройки остановки маршрута через чат, в секундах.
  min-stop-minutes: 1 # Минимальная длительность остановки, в минутах.
  max-stop-minutes: 1440 # Максимальная длительность остановки, в минутах.
  max-stops-per-caravan: 10 # Максимум остановок на один караван.
  allow-own-town: true # Разрешать ли выбирать свой город как точку маршрута.
  allow-allied-towns: true # Разрешать ли союзные города.
  allow-neutral-towns: true # Разрешать ли нейтральные города.
  allow-enemy-towns: false # Разрешать ли вражеские города.
  random-shop-plot-selection: true # Случайно выбирать Shop Plot в выбранном городе.
  allow-loop-routes: true # Разрешать ли циклические маршруты.
  stop-effects:
    enabled: true # Показывать ли эффекты при прибытии на остановку.
    particle: CAMPFIRE_COSY_SMOKE # Частица при остановке.
    sound: ENTITY_WANDERING_TRADER_YES # Звук при остановке.

notifications:
  
  queue-offline-notifications: true # Сохранять ли уведомления в памяти, если владелец офлайн.
  max-queued-per-player: 20 # Максимум отложенных уведомлений на игрока.

dynmap:
  
  enabled: true # Включает интеграцию с Dynmap, если он установлен.
  update-interval-seconds: 10 # Интервал обновления маркеров, в секундах.
  marker-set-id: meltarion_caravans # ID набора маркеров в Dynmap.
  show-eta: true # Показывать ли ETA в подписи маркера.

physical-caravan:
  enabled: true # Включает физическую проекцию каравана.
  despawn-on-plugin-disable: true # Удалять ли проекции при выключении или перезагрузке плагина.
  cleanup-orphaned-entities-on-enable: true # Удалять ли осиротевшие сущности караванов при включении плагина.
  prevent-duplicate-spawn: true # Блокировать ли повторный спавн одного и того же каравана.
  spawn-radius: 3 # Радиус разлёта сущностей при первичном спавне.

  names:
    # Имя торговца каравана.
    trader: "&6Караван %player%"

    # Имя первой ламы.
    llama-1: "&eЛама каравана"

    # Имя второй ламы.
    llama-2: "&eЛама каравана"

  interaction:
    # Открывать ли меню настройки владельцу/админу по правому клику.
    owner-opens-setup: true

    # Показывать ли сообщение посторонним игрокам при запрете взаимодействия.
    stranger-message-enabled: true

  damage:
    # Включает обработку урона по проекции каравана.
    enabled: true

    # Переносить ли урон сущностей в системное HP каравана.
    sync-damage-to-caravan-hp: true

debug:
  # Включает дополнительные диагностические сообщения.
  enabled: false
