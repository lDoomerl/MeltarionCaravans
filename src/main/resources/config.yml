currency-item: GOLD_INGOT
default-caravan-limit: 1
permission-limits:
  meltarion.caravans.limit.2: 2
  meltarion.caravans.limit.3: 3

caravan:
  max-hp: 5000
  max-name-length: 24
  inventory-size: 27
  inventory-title: "&6Caravan: &e%name%"
  virtual-movement-enabled: true

caravan-license:
  enabled: true
  material: PAPER
  custom-model-data: 10001
  display-name: "&6Caravan License"
  lore:
    - "&7Required to create one caravan."
  require-display-name: true
  require-lore: false
  require-custom-model-data: true
  consume-on-create: true
  allow-right-click-create: true

trade:
  setup-timeout-seconds: 60
  buy-catalog:
    blacklist:
      - BEDROCK
      - BARRIER
      - COMMAND_BLOCK
      - CHAIN_COMMAND_BLOCK
      - REPEATING_COMMAND_BLOCK
      - STRUCTURE_BLOCK
      - STRUCTURE_VOID
      - JIGSAW
      - LIGHT
      - DEBUG_STICK
      - KNOWLEDGE_BOOK
      - PLAYER_HEAD
      - COMMAND_BLOCK_MINECART

