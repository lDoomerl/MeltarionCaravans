currency-item: GOLD_INGOT

default-caravan-limit: 1

permission-limits:
  meltarion.caravans.limit.2: 2
  meltarion.caravans.limit.3: 3

caravan:
  max-name-length: 24
  inventory-size: 27
  health: 5000
  damage-multiplier: 1.0
  visual-health-sync-interval-ticks: 20

caravan-license:
  enabled: true
  material: PAPER
  custom-model-data: 10001
  display-name: "&6Caravan License"
  lore:
    - "&7Required to create one caravan."
  require-display-name: true
  require-lore: false
  require-custom-model-data: true
  consume-on-create: true
  allow-right-click-create: true

trade:
  setup-timeout-seconds: 60
  buy-catalog:
    blacklist:
      - BEDROCK
      - BARRIER
      - COMMAND_BLOCK
      - CHAIN_COMMAND_BLOCK
      - REPEATING_COMMAND_BLOCK
      - STRUCTURE_BLOCK
      - STRUCTURE_VOID
      - JIGSAW
      - LIGHT
      - DEBUG_STICK
      - KNOWLEDGE_BOOK
      - PLAYER_HEAD
      - COMMAND_BLOCK_MINECART

movement:
  enabled: true
  tick-interval-seconds: 2
  database-save-interval-seconds: 30
  default-speed-blocks-per-second: 1.5
  physical-projection-radius: 96
  physical-despawn-radius: 128
  arrival-distance: 3
  adjust-y-to-highest-block: true
  max-y-adjust-per-update: 8
  pause-when-attacked: true
  attacked-notification-cooldown-seconds: 30
  auto-resume-after-attack: true
  auto-resume-delay-seconds: 120

projection:
  spawn-cooldown-seconds: 5
  despawn-cooldown-seconds: 5
  smooth-follow-distance: 8
  teleport-correction-distance: 24
  movement-sync-interval-ticks: 20

interaction:
  cooldown-millis: 500

route:
  enabled: true
  setup-timeout-seconds: 60
  min-stop-minutes: 1
  max-stop-minutes: 1440
  max-stops-per-caravan: 10
  allow-own-town: true
  allow-allied-towns: true
  allow-neutral-towns: true
  allow-enemy-towns: false
  random-shop-plot-selection: true
  allow-loop-routes: true
  stop-effects:
    enabled: true
    particle: CAMPFIRE_COSY_SMOKE
    sound: ENTITY_WANDERING_TRADER_YES

notifications:
  queue-offline-notifications: true
  max-queued-per-player: 20

dynmap:
  enabled: true
  update-interval-seconds: 10
  marker-set-id: meltarion_caravans
  show-eta: true

physical-caravan:
  enabled: true
  despawn-on-plugin-disable: true
  cleanup-orphaned-entities-on-enable: true
  prevent-duplicate-spawn: true
  spawn-radius: 3
  names:
    trader: "&6Caravan %player%"
    llama-1: "&eCaravan Llama"
    llama-2: "&eCaravan Llama"
  interaction:
    owner-opens-setup: true
    stranger-message-enabled: true
  damage:
    enabled: true
    sync-damage-to-caravan-hp: true

debug:
  enabled: false
