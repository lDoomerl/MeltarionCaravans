    - "&6/caravan admin buy <id> <material> <amount> <price> <max> &7- Create a BUY operation"
    - "&6/caravan admin delete <id> &7- Delete any caravan"
    - "&6/caravan admin reload &7- Reload the plugin configuration"
    - "&6/caravan admin givelicense <player> [amount] &7- Give Caravan Licenses"
