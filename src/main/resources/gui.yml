config-version: 1

gui:
  storage:
    title: "&6Караван: &e%name%"
  setup:
    title: "&8Настройка каравана"
    buttons:
      storage:
        material: CHEST
        name: "&6Склад"
        lore:
          - "&7Открыть инвентарь каравана."
      sell-items:
        material: EMERALD
        name: "&aПродажа товаров"
        lore:
          - "&7Выбрать предметы каравана для продажи."
      buy-orders:
        material: WRITABLE_BOOK
        name: "&bЗаявки на покупку"
        lore:
          - "&7Создать заявки каравана на покупку."
      existing-trades:
        material: BOOK
        name: "&eТекущие сделки"
        lore:
          - "&7Управление активными торговыми операциями."
      info:
        material: COMPASS
        name: "&dИнформация"
        lore:
          - "&7Посмотреть данные каравана."
      route:
        material: MAP
        name: "&9Маршрут"
        lore:
          - "&7Настроить остановки маршрута каравана."
      close:
        material: BARRIER
        name: "&cЗакрыть"
        lore:
          - "&7Закрыть это меню."
  sell-setup:
    title: "&8Настройка продажи: &6%name%"
  buy-catalog:
    categories:
      title: "&8Категории покупки"
      empty:
        name: "&cКаталог пуст"
        lore:
          - "&7Сейчас нет доступных записей для каталога покупки."
      button:
        name: "&6%category%"
        lore:
          - "&7Открыть материалы этой категории."
    materials:
      title: "&8Покупка: &6%category%"
      empty:
        name: "&cПустая категория"
        lore:
          - "&7В этой категории нет доступных материалов."
      button:
        name: "&f%material%"
        lore:
          - "&7Нажмите, чтобы создать заявку на покупку."
    shared:
      back:
        name: "&eНазад"
        lore:
          - "&7Вернуться к категориям."
      previous:
        name: "&eПредыдущая"
        lore:
          - "&7Перейти на предыдущую страницу."
      next:
        name: "&eСледующая"
        lore:
          - "&7Перейти на следующую страницу."
      close:
        name: "&cЗакрыть"
        lore:
          - "&7Закрыть это меню."
  public-trade:
    main:
      title: "&8Торговля с караваном"
      buttons:
        buy-from-caravan:
          material: EMERALD
          name: "&aКупить у каравана"
          lore:
            - "&7Посмотреть активные SELL-предложения."
        sell-to-caravan:
          material: CHEST
          name: "&6Продать каравану"
          lore:
            - "&7Посмотреть активные BUY-заявки."
        info:
          material: COMPASS
          name: "&dИнформация"
          lore:
            - "&7Посмотреть данные каравана."
        close:
          material: BARRIER
          name: "&cЗакрыть"
          lore:
            - "&7Закрыть это меню."
    sell-offers:
      title: "&8Покупка у каравана"
      offer:
        lore:
          - "&7Тип: &fSELL"
          - "&7Количество: &f%amount%"
          - "&7Цена: &f%price% %currency%"
          - "&7Остаток товара: &f%remaining%"
          - "&7Активна: &f%active%"
          - "&eНажмите, чтобы купить."
    buy-orders:
      title: "&8Продажа каравану"
      offer:
        lore:
          - "&7Тип: &fBUY"
          - "&7Количество за сделку: &f%amount%"
          - "&7Цена: &f%price% %currency%"
          - "&7Осталось купить: &f%remaining%"
          - "&7Активна: &f%active%"
          - "&eНажмите, чтобы продать."
    shared:
      back:
        name: "&eНазад"
        lore:
          - "&7Вернуться в меню торговли."
      close:
        name: "&cЗакрыть"
        lore:
          - "&7Закрыть это меню."
  trade-management:
    title: "&8Сделки каравана: &6%name%"
    operation:
      type: "&7Тип: &f%type%"
      sell-lore:
        - "&7Количество: &f%amount%"
        - "&7Цена: &f%price% %currency%"
        - "&7Слот: &f%slot%"
        - "&7Активна: &f%active%"
      buy-lore:
        - "&7Количество за сделку: &f%amount%"
        - "&7Цена: &f%price% %currency%"
        - "&7Максимум всего: &f%max_total%"
        - "&7Выполнено: &f%fulfilled%"
        - "&7Активна: &f%active%"
  route:
    title: "&8Настройка маршрута"
    stop-item:
      name: "%color%Остановка #%order% &7- &f%town%"
      lore:
        - "&7Город: &f%town%"
        - "&7Мир: &f%world%"
        - "&7Позиция: &f%position%"
        - "&7Длительность: &f%duration% мин"
        - "&7Текущая остановка: &f%active%"
        - "&eShift-клик, чтобы удалить."
    buttons:
      back:
        name: "&eНазад"
        lore:
          - "&7Вернуться к настройке каравана."
      add-stop:
        name: "&aДобавить остановку"
        lore:
          - "&7Выбрать город Towny и время остановки."
      loop:
        enabled-name: "&aЦикл маршрута: ВКЛ"
        disabled-name: "&cЦикл маршрута: ВЫКЛ"
        lore:
          - "&7Цикл разрешён: &f%allowed%"
          - "&7Примерная длительность маршрута: &f%duration% мин"
          - "&eНажмите для переключения."
      start:
        name: "&aЗапустить маршрут"
        lore:
          - "&7Начать выполнение маршрута каравана."
      stop:
        name: "&cОстановить маршрут"
        lore:
          - "&7Остановить текущий маршрут."
      clear:
        name: "&cОчистить маршрут"
        lore:
          - "&7Удалить все настроенные остановки."
      previous:
        name: "&eПредыдущая"
        lore:
          - "&7Перейти на предыдущую страницу."
      next:
        name: "&eСледующая"
        lore:
          - "&7Перейти на следующую страницу."
      close:
        name: "&cЗакрыть"
        lore:
          - "&7Закрыть это меню."
    town-select:
      title: "&8Города маршрута"
      item:
        name: "&6%town%"
        lore:
          - "&7Отношение: &f%relation%"
          - "&7Shop Plot: &f%shop_plots%"
          - "&eНажмите, чтобы выбрать случайный Shop Plot."
      back:
        name: "&eНазад"
        lore:
          - "&7Вернуться к настройке маршрута."
      previous:
        name: "&eПредыдущая"
        lore:
          - "&7Перейти на предыдущую страницу."
      next:
        name: "&eСледующая"
        lore:
          - "&7Перейти на следующую страницу."
      close:
        name: "&cЗакрыть"
        lore:
          - "&7Закрыть это меню."
  info:
    title: "&8Информация о караване"
    main:
      name: "&6%name%"
      lore:
        - "&7ID: &f%id%"
        - "&7Владелец: &f%player%"
        - "&7Статус: &f%status%"
        - "&7HP: &f%hp%&7/&f%max_hp%"
    close:
      name: "&cЗакрыть"
      lore:
        - "&7Закрыть это меню."
