name: Bug Report
description: Report a plugin bug or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below so we can reproduce it.
  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: e.g. v0.1.0 or 0.1.0-SNAPSHOT
    validations:
      required: true
  - type: input
    id: server_software
    attributes:
      label: Server software
      placeholder: e.g. Paper 1.21.4 build 123
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to trigger the problem.
      placeholder: |
        1. Spawn a caravan
        2. Open public trade
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack traces
      render: text
  - type: textarea
    id: extra
    attributes:
      label: Additional context
